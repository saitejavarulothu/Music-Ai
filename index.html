<!DOCTYPE html>
<html>
<head>
    <title>🎵 CoverComposer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        
        textarea, input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: Arial;
        }
        
        textarea:focus, input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .loading {
            background: #cfe2ff;
            color: #084298;
        }
        
        .player {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
        }
        
        .player.show {
            display: block;
        }
        
        audio {
            width: 100%;
            margin-bottom: 10px;
        }
        
        .download-btn {
            background: #28a745;
            margin-top: 10px;
        }
        
        .download-btn:hover {
            background: #218838;
        }
        
        .history {
            margin-top: 30px;
        }
        
        .history h2 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .history-item {
            background: #f9f9f9;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }
        
        .history-item p {
            margin: 5px 0;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 CoverComposer</h1>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">Generate music with AI</p>
        
        <!-- Form -->
        <form id="form">
            <div class="form-group">
                <label>🎵 What music do you want?</label>
                <textarea id="prompt" placeholder="Example: uplifting orchestral music with strings and piano" required></textarea>
            </div>
            
            <div class="form-group">
                <label>⏱️ Duration (seconds)</label>
                <input type="number" id="duration" min="5" max="30" value="10">
            </div>
            
            <button type="submit" id="btn">🎵 Generate Music</button>
        </form>
        
        <!-- Message -->
        <div id="message"></div>
        
        <!-- Player -->
        <div id="player" class="player">
            <h3>🎧 Your Music:</h3>
            <audio id="audio" controls></audio>
            <button id="downloadBtn" class="download-btn">⬇️ Download</button>
        </div>
        
        <!-- History -->
        <div id="history" class="history">
            <h2>📜 Previous Songs</h2>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('form');
        const btn = document.getElementById('btn');
        const msg = document.getElementById('message');
        const player = document.getElementById('player');
        const audio = document.getElementById('audio');
        const downloadBtn = document.getElementById('downloadBtn');
        const historyList = document.getElementById('historyList');
        
        let currentMusicId = null;

        // Handle form submit
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const prompt = document.getElementById('prompt').value;
            const duration = document.getElementById('duration').value;
            
            if (!prompt.trim()) {
                showMessage('Please enter a prompt', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '⏳ Generating... (1-2 min)';
            showMessage('🎵 Generating music... please wait', 'loading');
            
            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, duration: parseInt(duration) })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    currentMusicId = data.id;
                    audio.src = data.url;
                    player.classList.add('show');
                    showMessage('✅ Music generated!', 'success');
                    loadHistory();
                } else {
                    showMessage('❌ ' + (data.error || 'Error'), 'error');
                }
            } catch (err) {
                showMessage('❌ ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🎵 Generate Music';
            }
        });

        // Download button
        downloadBtn.addEventListener('click', () => {
            if (currentMusicId) {
                window.location.href = `/api/download/${currentMusicId}`;
            }
        });

        // Show message
        function showMessage(text, type) {
            msg.className = 'message ' + type;
            msg.textContent = text;
        }

        // Load history
        async function loadHistory() {
            try {
                const res = await fetch('/api/list');
                const data = await res.json();
                
                if (data.music.length === 0) {
                    historyList.innerHTML = '<p style="color: #999;">No music generated yet</p>';
                    return;
                }
                
                historyList.innerHTML = data.music.map(m => `
                    <div class="history-item">
                        <p><strong>${m.prompt.substring(0, 50)}...</strong></p>
                        <p>Duration: ${m.duration}s</p>
                        <a href="/api/download/${m.id}" style="color: #667eea; text-decoration: none;">⬇️ Download</a>
                    </div>
                `).join('');
            } catch (err) {
                console.log(err);
            }
        }

        // Load history on start
        loadHistory();
    </script>
</body>
</html>
